<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Card Cashback Calculator</title>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #1a1d2e;
    --border: #2a2d3e;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --cyan: #06b6d4;
    --green: #10b981;
    --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    min-height: 100vh;
  }
  .widget {
    max-width: 480px;
    margin: 0 auto;
    padding: 16px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .header-icon {
    font-size: 20px;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .header p {
    font-size: 11px;
    color: var(--muted);
  }
  .controls {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .control-row {
    margin-bottom: 12px;
  }
  .control-row:last-child { margin-bottom: 0; }
  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .spend-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--cyan);
    cursor: pointer;
  }
  input[type="number"] {
    width: 80px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    padding: 4px 8px;
    text-align: right;
    outline: none;
  }
  input[type="number"]:focus { border-color: var(--cyan); }
  .currency { color: var(--muted); font-size: 13px; }
  .toggle-row {
    display: flex;
    gap: 6px;
  }
  .toggle-btn {
    flex: 1;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
  }
  .toggle-btn.active {
    background: var(--cyan);
    border-color: var(--cyan);
    color: #000;
  }
  .results { display: flex; flex-direction: column; gap: 6px; }
  .card-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color .15s;
    text-decoration: none;
  }
  .card-row:hover { border-color: var(--cyan); }
  .rank {
    font-size: 11px;
    font-weight: 800;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank.gold { color: var(--gold); }
  .card-name {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
  }
  .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }
  .card-right {
    text-align: right;
    flex-shrink: 0;
  }
  .cashback-amount {
    font-size: 15px;
    font-weight: 800;
    color: var(--green);
  }
  .cashback-rate {
    font-size: 11px;
    color: var(--muted);
  }
  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: 600;
    margin-left: 4px;
  }
  .badge-staking {
    background: rgba(245,158,11,.15);
    color: var(--gold);
  }
  .badge-free {
    background: rgba(16,185,129,.12);
    color: var(--green);
  }
  .footer {
    margin-top: 12px;
    text-align: center;
  }
  .footer a {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    transition: color .15s;
  }
  .footer a:hover { color: var(--cyan); }
  .footer a span { color: var(--cyan); font-weight: 600; }
  .lang-bar {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 10px;
  }
  .lang-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .lang-btn.active { color: var(--cyan); font-weight: 700; }
</style>
</head>
<body>
<div class="widget">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('it')">IT</button>
  </div>

  <div class="header">
    <div class="header-icon">💳</div>
    <div>
      <h1 id="title">Crypto Card Cashback Calculator</h1>
      <p id="subtitle">Find the best card for your monthly spend</p>
    </div>
  </div>

  <div class="controls">
    <div class="control-row">
      <label id="spend-label">Monthly spend (€)</label>
      <div class="spend-row">
        <input type="range" id="slider" min="100" max="5000" step="50" value="1000" oninput="sync('slider')">
        <span class="currency">€</span>
        <input type="number" id="input" min="0" max="99999" value="1000" oninput="sync('input')">
      </div>
    </div>
    <div class="control-row">
      <label id="staking-label">Staking profile</label>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btn-no" onclick="setStaking(false)"></button>
        <button class="toggle-btn" id="btn-yes" onclick="setStaking(true)"></button>
      </div>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="footer">
    <a href="https://topcryptocards.eu" target="_blank" rel="noopener">
      Powered by <span>topcryptocards.eu</span> — Independent comparison of 90+ crypto cards
    </a>
  </div>
</div>

<script>
// ─── Card data ────────────────────────────────────────────────────────────────
// rateNoStaking: base cashback % without any staking
// rateStaking:   max cashback % with staking
// staking:       'none' | 'optional' | 'required'
// token:         reward currency
// fees:          annual fee in €
// url:           relative path on topcryptocards.eu
const CARDS = [
  { name:'Bybit Card',       token:'MNT',  rateNoStaking:10,  rateStaking:10,  staking:'none',     fees:0  },
  { name:'Plutus',           token:'PLU',  rateNoStaking:3,   rateStaking:9,   staking:'required', fees:0  },
  { name:'Wirex Card',       token:'WXT',  rateNoStaking:2,   rateStaking:8,   staking:'optional', fees:0  },
  { name:'Binance Card',     token:'BNB',  rateNoStaking:4,   rateStaking:8,   staking:'optional', fees:0  },
  { name:'Crypto.com Visa',  token:'CRO',  rateNoStaking:1,   rateStaking:5,   staking:'required', fees:0  },
  { name:'Gnosis Pay',       token:'GNO',  rateNoStaking:5,   rateStaking:5,   staking:'none',     fees:0  },
  { name:'Bleap Card',       token:'BTC',  rateNoStaking:2,   rateStaking:2,   staking:'none',     fees:0  },
  { name:'Nexo Card',        token:'BTC',  rateNoStaking:2,   rateStaking:2,   staking:'none',     fees:0  },
  { name:'MetaMask Card',    token:'ETH',  rateNoStaking:3,   rateStaking:3,   staking:'none',     fees:0  },
  { name:'Ledger/Baanx',     token:'BTC',  rateNoStaking:2,   rateStaking:2,   staking:'none',     fees:0  },
  { name:'Coinbase Card',    token:'BTC',  rateNoStaking:2,   rateStaking:2,   staking:'none',     fees:0  },
  { name:'Brighty Card',     token:'BTC',  rateNoStaking:1,   rateStaking:1,   staking:'none',     fees:0  },
  { name:'Bitpanda Card',    token:'BEST', rateNoStaking:1,   rateStaking:1,   staking:'none',     fees:0  },
];

// ─── i18n ─────────────────────────────────────────────────────────────────────
const T = {
  en: {
    title:    'Crypto Card Cashback Calculator',
    subtitle: 'Find the best card for your monthly spend',
    spend:    'Monthly spend (€)',
    staking:  'Staking profile',
    noStake:  'No staking',
    yesStake: 'With staking',
    year:     '/year',
    powered:  'Powered by',
    tagline:  '— Independent comparison of 90+ crypto cards',
    moReturn: 'monthly',
  },
  fr: {
    title:    'Calculateur de cashback crypto',
    subtitle: 'Trouvez la meilleure carte pour vos dépenses',
    spend:    'Dépenses mensuelles (€)',
    staking:  'Profil de staking',
    noStake:  'Sans staking',
    yesStake: 'Avec staking',
    year:     '/an',
    powered:  'Propulsé par',
    tagline:  '— Comparatif indépendant de 90+ cartes crypto',
    moReturn: 'par mois',
  },
  de: {
    title:    'Krypto-Karte Cashback-Rechner',
    subtitle: 'Beste Karte für Ihre monatlichen Ausgaben',
    spend:    'Monatliche Ausgaben (€)',
    staking:  'Staking-Profil',
    noStake:  'Ohne Staking',
    yesStake: 'Mit Staking',
    year:     '/Jahr',
    powered:  'Powered by',
    tagline:  '— Unabhängiger Vergleich von 90+ Krypto-Karten',
    moReturn: 'monatlich',
  },
  es: {
    title:    'Calculadora de cashback de tarjetas crypto',
    subtitle: 'Encuentra la mejor tarjeta para tus gastos',
    spend:    'Gasto mensual (€)',
    staking:  'Perfil de staking',
    noStake:  'Sin staking',
    yesStake: 'Con staking',
    year:     '/año',
    powered:  'Comparativa por',
    tagline:  '— Comparación independiente de 90+ tarjetas crypto',
    moReturn: 'mensual',
  },
  it: {
    title:    'Calcolatore cashback carte crypto',
    subtitle: 'Trova la migliore carta per le tue spese',
    spend:    'Spesa mensile (€)',
    staking:  'Profilo staking',
    noStake:  'Senza staking',
    yesStake: 'Con staking',
    year:     '/anno',
    powered:  'Powered by',
    tagline:  '— Confronto indipendente di 90+ carte crypto',
    moReturn: 'al mese',
  },
};

// ─── State ────────────────────────────────────────────────────────────────────
let lang = (function() {
  const p = new URLSearchParams(location.search).get('lang');
  if (p && T[p]) return p;
  const bl = navigator.language.slice(0,2).toLowerCase();
  return T[bl] ? bl : 'en';
})();

let staking = false;
let spend = 1000;

// ─── Logic ────────────────────────────────────────────────────────────────────
function getRate(card) {
  return staking ? card.rateStaking : card.rateNoStaking;
}

function render() {
  const t = T[lang];

  // Texts
  document.getElementById('title').textContent   = t.title;
  document.getElementById('subtitle').textContent = t.subtitle;
  document.getElementById('spend-label').textContent = t.spend;
  document.getElementById('staking-label').textContent = t.staking;
  document.getElementById('btn-no').textContent  = t.noStake;
  document.getElementById('btn-yes').textContent = t.yesStake;
  document.querySelector('.footer a').innerHTML  =
    `${t.powered} <span>topcryptocards.eu</span> ${t.tagline}`;

  // Toggle state
  document.getElementById('btn-no').className  = 'toggle-btn' + (!staking ? ' active' : '');
  document.getElementById('btn-yes').className = 'toggle-btn' + ( staking ? ' active' : '');

  // Sort cards
  const sorted = [...CARDS].sort((a,b) => getRate(b) - getRate(a)).slice(0,7);

  const container = document.getElementById('results');
  container.innerHTML = sorted.map((card, i) => {
    const rate = getRate(card);
    const monthly = (spend * rate / 100).toFixed(2);
    const stakingTag = card.staking === 'required'
      ? `<span class="badge badge-staking">🔒</span>`
      : card.staking === 'none'
      ? `<span class="badge badge-free">✓</span>`
      : '';
    const feeNote = card.fees > 0 ? `− €${card.fees}${t.year}` : '';
    const url = `https://topcryptocards.eu/${lang === 'fr' || lang === 'be' ? 'fr' : lang}/comparer`;
    return `<a class="card-row" href="${url}" target="_blank" rel="noopener">
      <div class="rank${i===0?' gold':''}">${i===0?'🥇':i+1}</div>
      <div style="flex:1">
        <div class="card-name">${card.name}${stakingTag}</div>
        <div class="card-sub">${rate}% in ${card.token}${feeNote ? ' · ' + feeNote : ''}</div>
      </div>
      <div class="card-right">
        <div class="cashback-amount">€${monthly}</div>
        <div class="cashback-rate">${t.moReturn}</div>
      </div>
    </a>`;
  }).join('');
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function sync(src) {
  const v = parseInt(src === 'slider'
    ? document.getElementById('slider').value
    : document.getElementById('input').value) || 0;
  spend = Math.max(0, Math.min(99999, v));
  document.getElementById('slider').value = Math.min(5000, spend);
  document.getElementById('input').value  = spend;
  render();
}

function setStaking(val) {
  staking = val;
  render();
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.className = 'lang-btn' + (b.textContent.toLowerCase() === l ? ' active' : '');
  });
  render();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
