[images]
remote_images = [ "https://pnrwskzladqibjqngxem.supabase.co/.*" ]

[build]
# Build is handled by GitHub Actions (build + prerender + deploy via CLI).
# ignore = "exit 0" tells Netlify CI to always skip its own build so it never
# overwrites the prerendered HTML that GitHub Actions deployed.
ignore = "exit 0"
publish = "dist"

# Cache immutable hashed assets aggressively
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate (prerendered content changes on deploy)
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://pnrwskzladqibjqngxem.supabase.co https://www.google-analytics.com; connect-src 'self' https://pnrwskzladqibjqngxem.supabase.co wss://pnrwskzladqibjqngxem.supabase.co https://www.google-analytics.com https://www.googletagmanager.com https://region1.google-analytics.com; frame-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"