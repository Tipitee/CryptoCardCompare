[images]
remote_images = [ "https://pnrwskzladqibjqngxem.supabase.co/.*" ]

[build]
command = "npx vite build"
publish = "dist"

# Cache immutable hashed assets aggressively
[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate (prerendered content changes on deploy)
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"